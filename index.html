<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARLIFT PRIME</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0d0d0d;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: #111;
  text-shadow: 0 0 10px red, 0 0 20px red;
}

.container {
  padding: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  background: #1f1f1f;
  color: white;
  box-shadow: 0 0 10px red;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  background: #1a1a1a;
  color: white;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}

.timer {
  text-align: center;
  font-size: 40px;
}
</style>
</head>

<body>

<header>WARLIFT PRIME</header>

<div class="container">

<div class="card">
  <input id="exercise" placeholder="種目">
  <input id="weight" type="number" placeholder="重量">
  <input id="reps" type="number" placeholder="回数">
  <button onclick="completeSet()">セット完了</button>
</div>

<div class="card">
  <div class="timer" id="timer">60</div>
  <button onclick="startTimer()">スタート</button>
</div>

</div>

<script>
let timer = 60;
let interval = null;

function evaluateSet(weight, reps, rpe){
  const e1rm = weight * (1 + reps / 30);
  const fatigue = rpe >= 9 ? "HIGH" : rpe >= 8 ? "MED" : "LOW";
  return { e1rm, fatigue };
}

function nextSetDecision(last){
  let nextWeight = last.weight;
  let instruction = "";

  if(last.rpe >= 9.5){
    nextWeight -= 5;
    instruction = "重量下げろ";
  } else if(last.rpe >= 9){
    instruction = "重量維持";
  } else if(last.rpe >= 8){
    nextWeight += 2.5;
    instruction = "+2.5kg";
  } else {
    nextWeight += 5;
    instruction = "+5kg";
  }

  return { weight: Math.max(0, nextWeight), instruction };
}

function completeSet(){
  const weight = parseFloat(document.getElementById("weight").value);
  const reps = parseFloat(document.getElementById("reps").value);

  const rpe = parseFloat(prompt("RPE入力 (例: 8.5)"));

  const evalData = evaluateSet(weight, reps, rpe);
  const next = nextSetDecision({weight, reps, rpe});

  alert(
`推定1RM: ${Math.round(evalData.e1rm)}kg
疲労: ${evalData.fatigue}

次: ${next.weight}kg
${next.instruction}`
  );
}

function startTimer(){
  if(interval) return;
  interval = setInterval(()=>{
    timer--;
    document.getElementById("timer").innerText = timer;
    if(timer<=0){
      clearInterval(interval);
      interval=null;
      playAlarm();
    }
  },1000);
}

function playAlarm(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(60, ctx.currentTime);
  gain.gain.setValueAtTime(0.5, ctx.currentTime);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),2000);
}
</script>

</body>
</html>
